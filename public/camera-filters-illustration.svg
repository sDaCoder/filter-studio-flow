<svg width="800" height="600" viewBox="0 0 800 600" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title description">
  <title id="title">Camera and photo filter controls illustration</title>
  <desc id="description">A stylized camera with a colorful lens, filter sliders, and edited image previews in a warm glass interface style.</desc>
  <defs>
    <linearGradient id="bg" x1="92" y1="64" x2="696" y2="560" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFBF6"/>
      <stop offset="0.52" stop-color="#F4F3F8"/>
      <stop offset="1" stop-color="#EEF5FB"/>
    </linearGradient>
    <linearGradient id="cameraBody" x1="162" y1="174" x2="488" y2="424" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF" stop-opacity="0.96"/>
      <stop offset="1" stop-color="#ECEDF5" stop-opacity="0.86"/>
    </linearGradient>
    <linearGradient id="lensRing" x1="227" y1="247" x2="396" y2="395" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F59E0B"/>
      <stop offset="0.3" stop-color="#FDBA38"/>
      <stop offset="0.56" stop-color="#7C5CFC"/>
      <stop offset="0.8" stop-color="#36B5D6"/>
      <stop offset="1" stop-color="#172033"/>
    </linearGradient>
    <radialGradient id="lensGlass" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(294 286) rotate(50.5) scale(123)">
      <stop stop-color="#FCEBC4"/>
      <stop offset="0.21" stop-color="#C8913B"/>
      <stop offset="0.42" stop-color="#6E57BD"/>
      <stop offset="0.67" stop-color="#15223C"/>
      <stop offset="1" stop-color="#080E1A"/>
    </radialGradient>
    <linearGradient id="lensReflection" x1="264" y1="257" x2="335" y2="338" gradientUnits="userSpaceOnUse">
      <stop stop-color="white" stop-opacity="0.82"/>
      <stop offset="1" stop-color="#D7EAFF" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="panel" x1="494" y1="156" x2="684" y2="446" gradientUnits="userSpaceOnUse">
      <stop stop-color="white" stop-opacity="0.92"/>
      <stop offset="1" stop-color="white" stop-opacity="0.7"/>
    </linearGradient>
    <linearGradient id="filterWarm" x1="508" y1="389" x2="558" y2="436" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFE1A5"/>
      <stop offset="1" stop-color="#F59E0B"/>
    </linearGradient>
    <linearGradient id="filterMoody" x1="568" y1="389" x2="618" y2="436" gradientUnits="userSpaceOnUse">
      <stop stop-color="#CFC7FF"/>
      <stop offset="1" stop-color="#6650B8"/>
    </linearGradient>
    <linearGradient id="filterCool" x1="628" y1="389" x2="678" y2="436" gradientUnits="userSpaceOnUse">
      <stop stop-color="#BEECF8"/>
      <stop offset="1" stop-color="#279BC0"/>
    </linearGradient>
    <filter id="ambientBlur" x="0" y="0" width="800" height="600" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="38"/>
    </filter>
    <filter id="softShadow" x="93" y="104" width="620" height="401" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="20" stdDeviation="22" flood-color="#172033" flood-opacity="0.11"/>
    </filter>
    <filter id="lensGlow" x="194" y="219" width="206" height="206" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#F59E0B" flood-opacity="0.2"/>
    </filter>
    <clipPath id="thumbOne">
      <rect x="508" y="389" width="50" height="47" rx="12"/>
    </clipPath>
    <clipPath id="thumbTwo">
      <rect x="568" y="389" width="50" height="47" rx="12"/>
    </clipPath>
    <clipPath id="thumbThree">
      <rect x="628" y="389" width="50" height="47" rx="12"/>
    </clipPath>
  </defs>

  <rect x="38" y="36" width="724" height="528" rx="48" fill="url(#bg)"/>
  <g filter="url(#ambientBlur)" opacity="0.56">
    <ellipse cx="185" cy="328" rx="89" ry="122" fill="#FBBF54"/>
    <ellipse cx="614" cy="188" rx="95" ry="84" fill="#B3A5FC"/>
    <ellipse cx="602" cy="456" rx="109" ry="82" fill="#78D5E9"/>
  </g>

  <g filter="url(#softShadow)">
    <path d="M180 207C180 188.222 195.222 173 214 173H275.5L293.5 151H365.5L384 173H437C455.778 173 471 188.222 471 207V390C471 408.778 455.778 424 437 424H214C195.222 424 180 408.778 180 390V207Z" fill="url(#cameraBody)" stroke="white" stroke-width="2"/>
    <rect x="494" y="147" width="190" height="301" rx="27" fill="url(#panel)" stroke="white" stroke-width="2"/>
  </g>

  <circle cx="215" cy="209" r="10" fill="#F59E0B"/>
  <circle cx="215" cy="209" r="17" stroke="#F59E0B" stroke-opacity="0.18" stroke-width="6"/>
  <rect x="396" y="198" width="44" height="16" rx="8" fill="#D5D8E2"/>
  <rect x="397" y="201" width="20" height="10" rx="5" fill="#F8FAFC"/>

  <g filter="url(#lensGlow)">
    <circle cx="297" cy="322" r="94" fill="#F8FAFC" stroke="#EAECF3" stroke-width="2"/>
    <circle cx="297" cy="322" r="78" fill="url(#lensRing)"/>
    <circle cx="297" cy="322" r="64" fill="url(#lensGlass)"/>
    <circle cx="297" cy="322" r="51" stroke="#D3E7FD" stroke-opacity="0.16" stroke-width="2"/>
    <path d="M259.5 293.5C272 272.5 296.5 260.5 317 268C302.5 274.5 291.5 286.5 285.5 300C278.5 315.5 269 316 259.5 310.5C252.5 306.5 254 301 259.5 293.5Z" fill="url(#lensReflection)"/>
    <ellipse cx="273.5" cy="288.5" rx="10.5" ry="6.5" transform="rotate(-28 273.5 288.5)" fill="white" fill-opacity="0.52"/>
  </g>

  <path d="M403 286L421 268L439 286" stroke="#DCE0EA" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M403 356L421 374L439 356" stroke="#DCE0EA" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="407" y="298" width="28" height="44" rx="14" fill="#F8F9FC" stroke="#DFE2EC"/>
  <rect x="411" y="318" width="20" height="20" rx="10" fill="#F59E0B"/>

  <text x="514" y="181" fill="#6A7285" font-family="'Space Mono', monospace" font-size="10" font-weight="700" letter-spacing="1.8">FILTERS</text>
  <text x="514" y="209" fill="#242B3A" font-family="'DM Sans', Arial, sans-serif" font-size="17" font-weight="600">Live adjustments</text>

  <g>
    <text x="514" y="245" fill="#697386" font-family="'DM Sans', Arial, sans-serif" font-size="11" font-weight="500">Exposure</text>
    <rect x="514" y="257" width="146" height="6" rx="3" fill="#E8EAF0"/>
    <rect x="514" y="257" width="88" height="6" rx="3" fill="#F59E0B"/>
    <circle cx="602" cy="260" r="9" fill="white" stroke="#F59E0B" stroke-width="3"/>
  </g>
  <g>
    <text x="514" y="292" fill="#697386" font-family="'DM Sans', Arial, sans-serif" font-size="11" font-weight="500">Contrast</text>
    <rect x="514" y="304" width="146" height="6" rx="3" fill="#E8EAF0"/>
    <rect x="514" y="304" width="113" height="6" rx="3" fill="#7B61D8"/>
    <circle cx="627" cy="307" r="9" fill="white" stroke="#7B61D8" stroke-width="3"/>
  </g>
  <g>
    <text x="514" y="339" fill="#697386" font-family="'DM Sans', Arial, sans-serif" font-size="11" font-weight="500">Saturation</text>
    <rect x="514" y="351" width="146" height="6" rx="3" fill="#E8EAF0"/>
    <rect x="514" y="351" width="73" height="6" rx="3" fill="#2CB7D6"/>
    <circle cx="587" cy="354" r="9" fill="white" stroke="#2CB7D6" stroke-width="3"/>
  </g>

  <g clip-path="url(#thumbOne)">
    <rect x="508" y="389" width="50" height="47" rx="12" fill="url(#filterWarm)"/>
    <path d="M508 426L526 408L538 417L548 404L558 417V436H508V426Z" fill="#FFF4D6" fill-opacity="0.8"/>
    <circle cx="545" cy="401" r="6" fill="#FFF5D5" fill-opacity="0.9"/>
  </g>
  <g clip-path="url(#thumbTwo)">
    <rect x="568" y="389" width="50" height="47" rx="12" fill="url(#filterMoody)"/>
    <path d="M568 426L586 408L598 417L608 404L618 417V436H568V426Z" fill="#E9E6FF" fill-opacity="0.8"/>
    <circle cx="605" cy="401" r="6" fill="#F0EDFF" fill-opacity="0.9"/>
  </g>
  <g clip-path="url(#thumbThree)">
    <rect x="628" y="389" width="50" height="47" rx="12" fill="url(#filterCool)"/>
    <path d="M628 426L646 408L658 417L668 404L678 417V436H628V426Z" fill="#E1F7FC" fill-opacity="0.84"/>
    <circle cx="665" cy="401" r="6" fill="#E9FBFF" fill-opacity="0.95"/>
  </g>

  <g>
    <rect x="139" y="454" width="315" height="47" rx="23.5" fill="white" fill-opacity="0.64" stroke="white"/>
    <path d="M168 479.5L174 473.5L180 479.5" stroke="#F59E0B" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M174 474V485" stroke="#F59E0B" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M166 484V487C166 489.209 167.791 491 170 491H178C180.209 491 182 489.209 182 487V484" stroke="#F59E0B" stroke-width="2.5" stroke-linecap="round"/>
    <text x="195" y="483" fill="#374151" font-family="'Space Mono', monospace" font-size="12" font-weight="700" letter-spacing="1.5">CAPTURE  /  ENHANCE</text>
  </g>

  <path d="M110 151H134" stroke="#F59E0B" stroke-width="3" stroke-linecap="round"/>
  <path d="M122 139V163" stroke="#F59E0B" stroke-width="3" stroke-linecap="round"/>
  <path d="M698 111H716" stroke="#7B61D8" stroke-width="3" stroke-linecap="round"/>
  <path d="M707 102V120" stroke="#7B61D8" stroke-width="3" stroke-linecap="round"/>
  <circle cx="121" cy="416" r="5" fill="#2CB7D6" fill-opacity="0.62"/>
  <circle cx="708" cy="483" r="7" fill="#F59E0B" fill-opacity="0.55"/>
</svg>
